<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-form-container">
    <mat-card class="login-card" appearance="outlined">
      <mat-card-content>
        <div class="login-logo">
          <mat-icon>local_hospital</mat-icon>
        </div>
        <div class="login-header">
          <h1 class="login-title">Bienvenido de nuevo</h1>
          <p class="login-subtitle">Ingresa tus credenciales para acceder al sistema</p>
        </div>

        @if (error()) {
          <div class="error-alert">
            <mat-icon>error</mat-icon>
            <span>{{ error() }}</span>
          </div>
        }

        <form (ngSubmit)="onSubmit()" class="login-form">
          <mat-form-field appearance="outline" class="form-field" subscriptSizing="dynamic">
            <mat-label>Usuario</mat-label>
            <input
              matInput
              [ngModel]="username()"
              (ngModelChange)="username.set($event)"
              name="username"
              placeholder="Ingrese su usuario"
              autocomplete="username"
            />
            <mat-icon matPrefix>person</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="form-field" subscriptSizing="dynamic">
            <mat-label>Contraseña</mat-label>
            <input
              matInput
              [type]="hidePassword() ? 'password' : 'text'"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
              placeholder="Ingrese su contraseña"
              autocomplete="current-password"
            />
            <mat-icon matPrefix>lock</mat-icon>
            <button
              type="button"
              mat-icon-button
              matSuffix
              (click)="hidePassword.set(!hidePassword())"
              [attr.aria-label]="'Toggle password'"
              tabindex="-1"
            >
              <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>

          <button
            mat-flat-button
            type="submit"
            [disabled]="loading()"
            class="submit-btn"
          >
            @if (loading()) {
              <mat-spinner diameter="20" class="btn-spinner"></mat-spinner>
              <span>Ingresando...</span>
            } @else {
              <span>Ingresar</span>
            }
          </button>
        </form>

        <div class="login-divider">
          <span>o</span>
        </div>

        <div class="login-back">
          <a routerLink="/" class="back-link">
            <mat-icon>arrow_back</mat-icon>
            Volver al inicio
          </a>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
